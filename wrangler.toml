name = "aprs-internal"
main = "src/index.ts"
compatibility_date = "2025-04-15"
compatibility_flags = ["nodejs_compat"]

# SAFETY: pin the account so wrangler refuses to deploy if the active token
# belongs to a different Cloudflare account. See memory:
# feedback_cloudflare_accounts — before any wrangler command, run `wrangler whoami`
# and verify this account id.
account_id = "d8e848325a1b3c22b7631ed3f51eecdb"

routes = [
  { pattern = "internal.aprsfoundation.org", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "aprs-internal-db"
database_id = "45c19003-01a7-4f79-8aed-fd7cbf2b64d6"

# R2 bucket for card attachments (S11). Files are stored under keys of
# the form `cards/<cardId>/<random>-<filename>`. Worker proxies upload
# and download — no presigned URLs, so authentication is enforced at
# the route layer via the existing session.
[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "aprs-internal-attachments"

[[durable_objects.bindings]]
name = "KANBAN_DO"
class_name = "KanbanBoardDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["KanbanBoardDO"]

# KV namespace used by @cloudflare/workers-oauth-provider to store
# registered OAuth clients, grants, and access tokens for the MCP
# connector. Create with:
#   wrangler kv namespace create OAUTH_KV
# then paste the returned id here.
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
ENVIRONMENT = "production"
OKTA_DOMAIN = "aprsfoundation.okta.com"
OKTA_CLIENT_ID = "0oa22i75bs5uDKDrT1d8"
SITE_URL = "https://internal.aprsfoundation.org"

# Secrets (set via `wrangler secret put`, NOT here):
#   OKTA_CLIENT_SECRET
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   SESSION_SECRET

[dev]
port = 8788
